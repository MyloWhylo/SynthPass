[platformio]
description = An open-source protocol & hardware design for to detect nose boops & transfer simple data, designed for protogen/synth fursuits.
default_envs = genericCH572Q

[env]
platform = ch32v
framework = ch32v003fun
; Use the locally-cloned upstream ch32fun (sibling ../ch32fun) as the framework.
; More up-to-date than the pinned version as of the writing of this comment
platform_packages =
	framework-ch32v003fun @ symlink://../ch32fun

board = genericCH572Q
; Custom linker script: reserves the top 192K of flash for the message store.
board_build.ldscript = synthpass_ch572.ld

; This CH572 is configured for USB-bootloader mode, which disables the SWIO debug interface -- so the usual `minichlink` (SWIO) upload can't reach it.
; Instead we flash through minichlink's USB-bootloader (ISP) programmer.
; (The platform's built-in `isp` protocol uses wchisp 0.2.3, whose chip DB predates the CH572 and errors out with "Cannot find chip id 0x72".)
upload_protocol = custom
upload_command = "$PROJECT_PACKAGES_DIR/tool-minichlink/minichlink" -C isp -w "$BUILD_DIR/${PROGNAME}.bin" flash -b
; The "custom" protocol only builds the .elf; this hook forces the .bin (which the command above flashes) to be rebuilt on every upload so it is never stale.
; Also sends a serial message to tell the app to jump to the bootloader.
extra_scripts = post:isp_upload.py

; For some reason, the USB file doesn't get picked up anymore.
build_src_filter = +<../../ch32fun/extralibs/fsusb.c> +<*> -<.git/> -<.svn/>

; ---- board variants ----
; Each env picks a BOARD_* macro that include/board.h switches on for pin
; assignments / LED polarity / etc. Build a specific variant with:
;   pio run -e <name> -t upload
; The default for bare `pio run` is set via [platformio] default_envs above.

[env:genericCH572Q]
build_flags = -DBOARD_GENERIC_CH572Q

[env:nanoch57x]
build_flags = -DBOARD_NANOCH57X

[env:pretzelslab]
build_flags = 	-DBOARD_PRETZELS_LAB_R1

[env:pretzelslab_i2c]
build_flags =	-DBOARD_PRETZELS_LAB_R1
				-DQWIIC_USE_I2C

[env:axionqc]
build_flags = -DBOARD_AXION_QC_R1